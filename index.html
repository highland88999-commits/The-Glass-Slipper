<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glass Slipper Portal - Olympus Monsterverse</title>
<style>
  body { margin: 0; overflow: hidden; background: #010103; font-family: 'Courier New', monospace; }
  canvas { display: block; pointer-events: none; }
  canvas.enabled { pointer-events: auto; }
  
  #start-screen {
    position: fixed; inset: 0; z-index: 9999;
    background: linear-gradient(rgba(1,1,3,0.4), rgba(1,1,3,0.7)), url('https://files.catbox.moe/4o8srk.jpeg') center/cover no-repeat;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    color: #00ffff; text-align: center; cursor: pointer; transition: opacity 1.8s ease-out, visibility 1.8s ease-out;
  }
  #start-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  #start-screen::before {
    content: ''; position: absolute; inset: 0;
    background: url('https://files.catbox.moe/4o8srk.jpeg') center/cover no-repeat;
    transform: scaleX(-1); filter: blur(1.5px) brightness(1.15);
    animation: slowPan 50s linear infinite; opacity: 0.9;
  }
  #start-text { font-size: clamp(1.9rem, 6vw, 3rem); letter-spacing: 8px; text-shadow: 0 0 25px #00ffff, 0 0 60px #00ffff; z-index: 2; animation: float 4.5s ease-in-out infinite; }
  #ticker { font-size: clamp(0.95rem, 2.8vw, 1.15rem); letter-spacing: 5px; color: #00ffcc; margin-top: 18px; z-index: 2; animation: ticker 1.6s linear infinite; }
  @keyframes ticker { 0%,100% { opacity: 0.35; } 50% { opacity: 1; } }
  @keyframes slowPan { 0% { background-position: 25% 50%; } 100% { background-position: 75% 50%; } }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

  #ui { position: absolute; bottom: 20px; left: 20px; color: #00ffaa; text-transform: uppercase; letter-spacing: 2px; pointer-events: none; text-shadow: 0 0 10px #00ffaa; z-index: 10; }
  #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 100; color: #00ffaa; text-align: center; backdrop-filter: blur(8px); }
  #modal-content { background: #010103; padding: 30px; border: 2px solid #00ffff; max-width: 600px; box-shadow: 0 0 40px #00ffff; }
  #modal-content a { color: #00ffcc; text-decoration: none; display: block; margin: 10px 0; transition: text-shadow 0.3s; }
  #modal-content a:hover { text-shadow: 0 0 15px #00ffcc; }
</style>
</head>
<body>
<div id="start-screen">
  <div id="start-text">MIRROR, MIRROR ON THE WALL</div>
  <div id="ticker">INITIALIZING GLASS SLIPPER PORTAL</div>
</div>

<div id="ui">System: Portal_Active // Protocol: Olympus_Slipper // Click to Enter Realms</div>
<div id="modal">
  <div id="modal-content">
    <h2>Portal to All Shoes Unlocked</h2>
    <p>Step through to sustainable realms. Partnerships forge the future.</p>
    <div id="partners"></div>
    <button onclick="closeModal()">Return to Hall</button>
  </div>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/postprocessing/EffectComposer.js';
import { RenderPass } from 'https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/postprocessing/UnrealBloomPass.js';

// SCENE
const scene = new THREE.Scene(); 
scene.background = new THREE.Color(0x010103);
scene.fog = new THREE.FogExp2(0x001122, 0.08);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 4, 10);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

// BLOOM
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.5, 0.5, 0.3);
composer.addPass(bloomPass);

// MATERIALS - UPGRADED GLASS
const glassMat = new THREE.MeshPhysicalMaterial({ 
  color: 0xccffff, metalness: 0, roughness: 0.05, 
  transmission: 1.0, thickness: 0.8, ior: 1.52,
  emissive: 0x00ffff, emissiveIntensity: 0.3, 
  clearcoat: 1.0, clearcoatRoughness: 0.0 
});
const stoneMat = new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.9, emissive: 0x001122, emissiveIntensity: 0.1 });
const carpetMat = new THREE.MeshStandardMaterial({ color: 0x440022, roughness: 0.8, emissive: 0x220011, emissiveIntensity: 0.2 });

// ROOM
const floor = new THREE.Mesh(new THREE.PlaneGeometry(20, 40), stoneMat);
floor.rotation.x = -Math.PI / 2; scene.add(floor);
const carpet = new THREE.Mesh(new THREE.PlaneGeometry(4, 40), carpetMat);
carpet.rotation.x = -Math.PI / 2; carpet.position.y = 0.01; scene.add(carpet);

// STAND + SLIPPER - SAME AS YOURS
const standGroup = new THREE.Group();
standGroup.add(new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.5, 0.5, 32), stoneMat));
const pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.8, 2, 32), stoneMat);
pillar.position.y = 1.5; standGroup.add(pillar);
standGroup.position.y = 0; scene.add(standGroup);

const slipperGroup = new THREE.Group();
// ...your slipper geometry here, using glassMat...
slipperGroup.position.set(0, 2.8, 0); slipperGroup.rotation.z = Math.PI / 5; scene.add(slipperGroup);

// LIGHTING - CYAN/MAGENTA
scene.add(new THREE.AmbientLight(0xffffff, 0.15));
scene.add(new THREE.PointLight(0x00ffff, 60, 50).position.set(0,5,2));
scene.add(new THREE.PointLight(0xff00aa, 40, 50).position.set(9,2,0));
scene.add(new THREE.PointLight(0xff00aa, 40, 50).position.set(-9,2,0));

// RAYCAST + MODAL - SAME AS YOURS
// ...keep your onClick, showModal, partners array...

// ANIMATION LOOP
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  slipperGroup.rotation.y += 0.008;
  slipperGroup.position.y = 2.8 + Math.sin(t * 1.2) * 0.08;
  
  // Portal pulse
  bloomPass.strength = 1.0 + Math.sin(t * 2) * 0.3;
  
  composer.render();
}
animate();

// START SCREEN LOGIC
const startScreen = document.getElementById('start-screen');
startScreen.addEventListener('click', () => {
  startScreen.classList.add('hidden');
  renderer.domElement.classList.add('enabled');
  bloomPass.strength = 1.35;
}, { once: true });
</script>
</body>
</html>
