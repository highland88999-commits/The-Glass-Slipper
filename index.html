<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Olympus By Merlin – The Glass Slipper Portal</title>
<style>
  body { 
    margin: 0; overflow: hidden; background: #010103; font-family: monospace;
    touch-action: none; -webkit-touch-callout: none; user-select: none;
  }
  canvas { display: block; outline: none; }
  
  /* UI Manager */
  #ui-manager {
    position: fixed; inset: 0; z-index: 9999; cursor: pointer;
    display: flex; align-items: center; justify-content: center; text-align: center; color: #00ffff;
  }
  #landing-layer {
    position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #010103;
    transition: opacity 1.2s ease-out;
  }
  #start-text {
    font-size: clamp(1.5rem, 5vw, 3rem); letter-spacing: 6px; padding: 0 20px;
    text-shadow: 0 0 25px #00ffff, 0 0 60px #00ffff, 0 0 90px #0088ff; z-index: 2;
    animation: float 4.5s ease-in-out infinite;
  }
  #ticker {
    font-size: clamp(0.85rem, 2.5vw, 1.15rem); letter-spacing: 4px; color: #00ffcc; margin-top: 18px; z-index: 2;
    animation: ticker 1.6s linear infinite, glitch 0.4s infinite;
  }
  #hint-layer {
    position: absolute; bottom: 12%; font-size: clamp(1rem, 3vw, 1.5rem); letter-spacing: 5px;
    text-shadow: 0 0 15px #00ffff; opacity: 0; transition: opacity 1.5s ease-in; z-index: 3; pointer-events: none;
  }
  
  /* Modal Overlay */
  #modal {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    justify-content: center; align-items: center; z-index: 10000; color: #00ffcc; text-align: center;
  }
  #modal-content {
    background: #050508; padding: 30px; border: 2px solid #00ffff; max-width: 600px;
    box-shadow: 0 0 30px rgba(0,255,255,0.3); font-family: monospace;
  }
  #modal-content h2 { font-size: 1.8rem; margin-bottom: 20px; text-shadow: 0 0 10px #00ffff; }
  #partners { max-height: 300px; overflow-y: auto; margin-bottom: 20px; padding-right: 10px; }
  #partners a { color: #ffffff; text-decoration: none; display: block; margin: 12px 0; font-size: 1.1rem; transition: text-shadow 0.2s; }
  #partners a:hover { text-shadow: 0 0 8px #00ffff, 0 0 15px #00ffff; }
  #modal-content button {
    background: transparent; border: 1px solid #00ffcc; color: #00ffcc; padding: 10px 20px;
    cursor: pointer; font-family: monospace; font-size: 1rem; transition: background 0.2s;
  }
  #modal-content button:hover { background: rgba(0,255,204,0.15); }

  @keyframes ticker { 0%,100% { opacity: 0.35; } 50% { opacity: 1; } }
  @keyframes glitch { 0% { text-shadow: 1px 0 #ff00ff, -1px 0 #00ffff; } 20% { text-shadow: -2px 0 #ff00ff, 2px 0 #00ffff; } 40% { text-shadow: 1px 0 #00ffff, -1px 0 #ff00ff; } 100% { text-shadow: 1px 0 #ff00ff, -1px 0 #00ffff; } }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
</style>

<script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
    }
  }
</script>

<script>
  window.onerror = function(msg) {
    document.getElementById('ticker').innerText = 'SYS_ERR: ' + msg;
    document.getElementById('ticker').style.color = '#ff0044';
    return false;
  };

  let appState = 'LANDING';

  function handleMasterClick() {
    if (appState === 'LANDING') {
      appState = 'OUTSIDE';
      
      if (window.unlockMedia) window.unlockMedia();

      document.getElementById('landing-layer').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('landing-layer').style.display = 'none';
        document.getElementById('hint-layer').style.opacity = '1';
      }, 1200);

    } else if (appState === 'OUTSIDE') {
      appState = 'ENTERING';
      document.getElementById('hint-layer').style.opacity = '0';
      document.getElementById('ui-manager').style.display = 'none'; 
      window.dispatchEvent(new Event('initiate-zoom'));
    }
  }
</script>
</head>

<body onclick="handleMasterClick()">

<div id="ui-manager">
  <div id="landing-layer">
    <div id="start-text">THE GLASS SLIPPER</div>
    <div id="ticker">TAP TO INITIALIZE PORTAL</div>
  </div>
  <div id="hint-layer">TAP TO WALK DOWN THE HALL</div>
</div>

<div id="modal">
  <div id="modal-content">
      <h2>Portal to All Shoes Unlocked</h2>
      <div id="partners"></div>
      <button onclick="closeModal(event)">Return to Hall</button>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ────────────────────────────────────────────────
// Scene Setup
// ────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x010103);
scene.fog = new THREE.FogExp2(0x010103, 0.015);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
// Start at the far end of the long hall looking down
camera.position.set(0, 4, 80); 
scene.add(camera);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.8, 0.4, 0.2);
composer.addPass(bloomPass);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enabled = false; 
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.enablePan = false; 
controls.target.set(0, 3, -20); // Looking towards the altar space
controls.maxPolarAngle = Math.PI / 2 + 0.05; 
controls.minDistance = 2;
controls.maxDistance = 120;

// ────────────────────────────────────────────────
// Dynamic Video Texture Pipeline
// ────────────────────────────────────────────────
function createVideo(url) {
    const v = document.createElement('video');
    v.src = url;
    v.muted = true;
    v.playsInline = true;
    v.loop = true;
    v.crossOrigin = 'anonymous';
    v.setAttribute('webkit-playsinline', 'webkit-playsinline');
    v.setAttribute('playsinline', 'playsinline');
    v.setAttribute('loop', 'true');
    v.addEventListener('ended', () => { v.currentTime = 0; v.play(); });
    return v;
}

const ceilingVid = createVideo('https://file.garden/alXjUY_coXedLaNA/gemini_generated_video_F950B8DA.mp4');
const wallVid    = createVideo('https://file.garden/alXjUY_coXedLaNA/gemini_generated_video_0AA8CE28.mp4');
const floorVid   = createVideo('https://file.garden/alXjUY_coXedLaNA/gemini_generated_video_C481BA95.mp4');
const backWallVid = createVideo('https://file.garden/alXjUY_coXedLaNA/gemini_generated_video_E6860566.mp4');

const mediaPool = [ceilingVid, wallVid, floorVid, backWallVid];
window.unlockMedia = () => { 
    mediaPool.forEach(vid => vid.play().catch(e => console.warn("Autoplay restriction overridden:", e))); 
};

function setupEnvironmentTexture(videoElement) {
    const tex = new THREE.VideoTexture(videoElement);
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.wrapS = THREE.MirroredRepeatWrapping;
    tex.wrapT = THREE.MirroredRepeatWrapping;
    tex.repeat.set(2, 1);
    return tex;
}

const ceilingTex  = setupEnvironmentTexture(ceilingVid);
const wallTex     = setupEnvironmentTexture(wallVid);
const floorTex    = setupEnvironmentTexture(floorVid);
const backWallTex = new THREE.VideoTexture(backWallVid); // Back projection planar texture
backWallTex.colorSpace = THREE.SRGBColorSpace;

// ────────────────────────────────────────────────
// Environmental Architecture (The Hall)
// ────────────────────────────────────────────────
const hallWidth = 24;
const hallHeight = 16;
const hallLength = 200;

const wallMatCommon = { roughness: 0.4, metalness: 0.1 };

// Floor
const floorMat = new THREE.MeshStandardMaterial({ map: floorTex, roughness: 0.2, ...wallMatCommon });
const floorGeo = new THREE.PlaneGeometry(hallWidth, hallLength);
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.set(0, 0, 0);
scene.add(floor);

// Ceiling
const ceilingMat = new THREE.MeshStandardMaterial({ map: ceilingTex, roughness: 0.5, ...wallMatCommon });
const ceilingGeo = new THREE.PlaneGeometry(hallWidth, hallLength);
const ceiling = new THREE.Mesh(ceilingGeo, ceilingMat);
ceiling.rotation.x = Math.PI / 2;
ceiling.position.set(0, hallHeight, 0);
scene.add(ceiling);

// Left Wall
const leftWallMat = new THREE.MeshStandardMaterial({ map: wallTex, roughness: 0.3, ...wallMatCommon });
const leftWallGeo = new THREE.PlaneGeometry(hallLength, hallHeight);
const leftWall = new THREE.Mesh(leftWallGeo, leftWallMat);
leftWall.rotation.y = Math.PI / 2;
leftWall.position.set(-hallWidth / 2, hallHeight / 2, 0);
scene.add(leftWall);

// Right Wall (Mirrored texture configuration via matching alignment or wrapping mapping)
const rightWallMat = leftWallMat.clone();
rightWallMat.map = wallTex.clone();
rightWallMat.map.wrapS = THREE.MirroredRepeatWrapping;
// Flips the horizontal processing dynamically to act as a direct mirror reflection across the hall
rightWallMat.map.repeat.set(-2, 1); 

const rightWall = new THREE.Mesh(leftWallGeo, rightWallMat);
rightWall.rotation.y = -Math.PI / 2;
rightWall.position.set(hallWidth / 2, hallHeight / 2, 0);
scene.add(rightWall);

// Back Wall (Terminal projection wall behind the pedestal altar space)
const backWallMat = new THREE.MeshStandardMaterial({ map: backWallTex, roughness: 0.5 });
const backWallGeo = new THREE.PlaneGeometry(hallWidth, hallHeight);
const backWall = new THREE.Mesh(backWallGeo, backWallMat);
backWall.position.set(0, hallHeight / 2, -hallLength / 2);
scene.add(backWall);

// ────────────────────────────────────────────────
// Altar & Glass Slipper Artifact
// ────────────────────────────────────────────────
const centerSpaceZ = -20; // Focused zone for the slipper installation

const standGroup = new THREE.Group();
const stoneMat = new THREE.MeshStandardMaterial({ color: 0x111115, roughness: 0.8, metalness: 0.8 });
const glassMat = new THREE.MeshPhysicalMaterial({
    color: 0xffffff,
    metalness: 0.1,
    roughness: 0.02,
    transmission: 1.0,
    thickness: 1.2,
    ior: 1.52,
    emissive: 0x00ffff,
    emissiveIntensity: 0.2,
    clearcoat: 1.0,
    clearcoatRoughness: 0.0
});

const baseGeo = new THREE.CylinderGeometry(2, 2.4, 0.8, 32);
const base = new THREE.Mesh(baseGeo, stoneMat);
base.position.y = 0.4;
standGroup.add(base);

const pillarGeo = new THREE.CylinderGeometry(1.4, 1.4, 3, 32);
const pillar = new THREE.Mesh(pillarGeo, stoneMat);
pillar.position.y = 2.3;
standGroup.add(pillar);

const topGeo = new THREE.CylinderGeometry(2.2, 2.2, 0.3, 32);
const top = new THREE.Mesh(topGeo, stoneMat);
top.position.y = 3.95;
standGroup.add(top);
standGroup.position.set(0, 0, centerSpaceZ);
scene.add(standGroup);

// Slipper Complex Model Structure
const slipperGroup = new THREE.Group();
const toeGeo = new THREE.SphereGeometry(0.7, 32, 16);
const toe = new THREE.Mesh(toeGeo, glassMat);
toe.position.set(0.6, 0, 0);
toe.scale.set(1.5, 0.6, 1.1);
slipperGroup.add(toe);

const bodyGeo = new THREE.CylinderGeometry(0.45, 0.55, 1.6, 32, 1, true);
const body = new THREE.Mesh(bodyGeo, glassMat);
body.rotation.z = Math.PI / 2;
body.position.set(-0.15, 0.05, 0);
slipperGroup.add(body);

const heelGeo = new THREE.CylinderGeometry(0.3, 0.5, 0.7, 32);
const heel = new THREE.Mesh(heelGeo, glassMat);
heel.position.set(-1.0, -0.2, 0);
heel.rotation.z = Math.PI / 9;
slipperGroup.add(heel);

slipperGroup.position.set(0, 4.4, centerSpaceZ);
slipperGroup.rotation.z = Math.PI / 6;
scene.add(slipperGroup);

// ────────────────────────────────────────────────
// Raycasting Interactivity
// ────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let isHovered = false;

function onMouseMove(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
}

function onClick(event) {
    if (engineState !== 'INSIDE') return;
    
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(slipperGroup.children, true);

    if (intersects.length > 0) {
        createPortalBurst();
        setTimeout(showModal, 400);
    }
}

window.addEventListener('mousemove', onMouseMove);
window.addEventListener('click', onClick);

function createPortalBurst() {
    const particleGeo = new THREE.BufferGeometry();
    const positions = [];
    for (let i = 0; i < 600; i++) {
        positions.push((Math.random() - 0.5) * 3);
        positions.push((Math.random() - 0.5) * 3 + 4.4);
        positions.push((Math.random() - 0.5) * 3 + centerSpaceZ);
    }
    particleGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    const particleMat = new THREE.PointsMaterial({ color: 0x00ffff, size: 0.08, transparent: true, blending: THREE.AdditiveBlending });
    const particles = new THREE.Points(particleGeo, particleMat);
    scene.add(particles);

    let opacity = 1.0;
    const anim = setInterval(() => {
        opacity -= 0.04;
        particleMat.opacity = opacity;
        particles.rotation.y += 0.02;
        if (opacity <= 0) {
            scene.remove(particles);
            clearInterval(anim);
        }
    }, 30);
}

// ────────────────────────────────────────────────
// UI Modal Ecosystem
// ────────────────────────────────────────────────
const partners = [
    { name: 'Allbirds Realm', url: 'https://www.allbirds.com/' },
    { name: 'KEEN Domain', url: 'https://www.keenfootwear.ca/' },
    { name: 'Veja Path', url: 'https://www.veja-store.com/' },
    { name: 'Hybrid Green Gate', url: 'https://hybridgreenlabel.com/' },
    { name: 'Cariuma Trail', url: 'https://cariuma.com/' },
    { name: 'ALOHAS Oasis', url: 'https://alohas.com/en-us' },
    { name: 'Reformation Empire', url: 'https://www.thereformation.com/' },
    { name: 'LØCI Labyrinth', url: 'https://lociwear.com/' },
    { name: 'Sézane Sanctuary', url: 'https://www.sezane.com/us' },
    { name: 'VIVAIA Vortex', url: 'https://vivaia.com/' },
    { name: 'Quince Quest', url: 'https://www.quince.com/' }
];

function showModal() {
    const div = document.getElementById('partners');
    div.innerHTML = '';
    partners.forEach(p => {
        const a = document.createElement('a');
        a.href = p.url;
        a.target = '_blank';
        a.textContent = `Enter ${p.name} →`;
        div.appendChild(a);
    });
    document.getElementById('modal').style.display = 'flex';
}

function closeModal(e) {
    if(e) e.stopPropagation();
    document.getElementById('modal').style.display = 'none';
}
window.closeModal = closeModal;

// ────────────────────────────────────────────────
// Lighting
// ────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.2));

const centerPointLight = new THREE.PointLight(0x00ffff, 35, 80);
centerPointLight.position.set(0, 8, centerSpaceZ);
scene.add(centerPointLight);

const pathLightL = new THREE.DirectionalLight(0x0088ff, 1.5);
pathLightL.position.set(-10, 5, 20);
scene.add(pathLightL);

// ────────────────────────────────────────────────
// Engine Logic Loop
// ────────────────────────────────────────────────
let engineState = 'ORBITING';
let orbitAngle = 0;
const insideCameraPos = new THREE.Vector3(0, 5.2, centerSpaceZ + 14);
const insideTarget = new THREE.Vector3(0, 4.5, centerSpaceZ);
const clock = new THREE.Clock();

window.addEventListener('initiate-zoom', () => { engineState = 'ZOOMING'; });

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

function loop() {
  requestAnimationFrame(loop);
  const delta = clock.getDelta();
  const t = clock.getElapsedTime();
  
  // Slipper continuous baseline physics adjustments
  slipperGroup.rotation.y += 0.006;
  slipperGroup.position.y = 4.4 + Math.sin(t * 1.5) * 0.12;

  if (engineState === 'ORBITING') {
    orbitAngle += 0.0015;
    // Sweeping camera preview down the expansive length of the hall architecture
    camera.position.set(Math.sin(orbitAngle) * 8, 4.5 + Math.sin(t * 0.4) * 0.5, 70 + Math.cos(orbitAngle) * 15);
    camera.lookAt(0, 4, centerSpaceZ + 30);
  } 
  else if (engineState === 'ZOOMING') {
    // Elegant physical linear traversal down the runway toward the altar area
    camera.position.lerp(insideCameraPos, 0.025);
    controls.target.lerp(insideTarget, 0.025);
    camera.lookAt(controls.target);
    
    if (camera.position.distanceTo(insideCameraPos) < 0.25) {
      engineState = 'INSIDE';
      controls.enabled = true;
    }
  } 
  else if (engineState === 'INSIDE') {
    controls.update();
    
    // Check selection state
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(slipperGroup.children, true);
    if (intersects.length > 0) {
        if (!isHovered) {
            isHovered = true;
            document.body.style.cursor = 'pointer';
            slipperGroup.scale.set(1.1, 1.1, 1.1);
        }
    } else {
        if (isHovered) {
            isHovered = false;
            document.body.style.cursor = 'default';
            slipperGroup.scale.set(1, 1, 1);
        }
    }
  }

  composer.render();
}
loop();
</script>
</body>
</html>
